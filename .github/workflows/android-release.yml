name: Android release AAB

# Builds a SIGNED Android App Bundle (.aab) for Play Store upload. Manual only (or on a v* tag).
# Requires four repo secrets — see docs/PLAY-RELEASE.md for how to create the keystore + set these:
#   ANDROID_KEYSTORE_BASE64    base64 of your upload-keystore.jks
#   ANDROID_KEYSTORE_PASSWORD  keystore (store) password
#   ANDROID_KEY_ALIAS          key alias
#   ANDROID_KEY_PASSWORD       key password
# The keys never live in the repo; the workflow decodes the keystore to a temp file at build time.

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build web app (www/)
        run: npm run build:www

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: android-actions/setup-android@v3

      - name: Sync Capacitor Android project
        run: npx cap sync android

      - name: Decode signing keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ]; then
            echo "::error::ANDROID_KEYSTORE_BASE64 secret is not set — cannot build a signed AAB. See docs/PLAY-RELEASE.md."
            exit 1
          fi
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/upload-keystore.jks"

      - name: Build signed release bundle (AAB)
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ runner.temp }}/upload-keystore.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          chmod +x gradlew
          # AAB for Play upload, plus a signed release APK for direct sideload testing —
          # both run R8/minify (release build type), so the APK exercises the exact shipping
          # config the AAB ships (unlike the debug APK, which is not minified).
          ./gradlew bundleRelease assembleRelease --no-daemon

      - name: Remove decoded keystore
        if: always()
        run: rm -f "$RUNNER_TEMP/upload-keystore.jks"

      - uses: actions/upload-artifact@v4
        with:
          name: rwb-tides-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        with:
          name: rwb-tides-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          if-no-files-found: error
